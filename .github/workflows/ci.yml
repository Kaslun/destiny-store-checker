name: ci
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "npm" }
      - run: npm install
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
        env:
          # Public placeholders so the build resolves; real secrets are never in CI for client.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-placeholder
      # Secret-leak gate: fail the build if any server-only secret reaches the client bundle.
      - run: npm run check:secrets
        env:
          BUNGIE_CLIENT_SECRET: ci-probe-secret-value
          SUPABASE_SERVICE_ROLE_KEY: ci-probe-service-role
          TOKEN_ENC_KEY: ci-probe-enc-key
